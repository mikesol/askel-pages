name: Deploy melers to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "melers/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: melers/package-lock.json

      - name: Install dependencies
        working-directory: melers
        run: npm ci

      - name: Build
        working-directory: melers
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: melers
          command: pages deploy out --project-name melers --branch main
